services:
    nginx:
        image: nginx:alpine
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html:ro
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - php

    php:
        build: ./docker/php
        volumes:
            - ./:/var/www/html
        depends_on:
            mysql:
                condition: service_healthy

    mysql:
        image: mysql:8.4
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: smarty_blog
        ports:
            - "3316:3306"
        volumes:
            - db-data:/var/lib/mysql
            # Схема применяется автоматически при первой инициализации БД
            - ./bin/db.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    db-data:
